name: Bug report
description: Report something that does not work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Anlyx. Please include enough local project context for us to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Anlyx version
      placeholder: "0.1.3"
    validations:
      required: true
  - type: dropdown
    id: integration
    attributes:
      label: Integration type
      options:
        - Spring Boot + Next.js App Router
        - OpenAPI + manual frontend URLs
        - Raw capture script
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include terminal output, browser console logs, or screenshots if relevant.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: anlyx.config.ts
      description: Remove secrets before pasting.
      render: ts
