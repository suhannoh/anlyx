name: Feature request
description: Suggest a capability, adapter, export, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Anlyx do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Live Workspace / UI
        - Spring Boot adapter
        - Next.js adapter
        - OpenAPI / manual support
        - Export / sharing
        - CLI / configuration
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, screenshots, examples, or constraints.
